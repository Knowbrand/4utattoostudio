<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4U Tattoo Studio | Bhilai</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: #fff;
  line-height: 1.6;
}

/* ===== HEADER ===== */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
  background: #000;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  font-weight: 700;
  font-size: 20px;
}

nav {
  display: flex;
}

nav a {
  margin-left: 25px;
  font-size: 14px;
  color: #ccc;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #fff;
}

.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}

/* ===== HERO ===== */

.hero {
  height: 85vh;
  display: flex;
  align-items: center;
  padding: 0 8%;
  background: #0f0f0f;
}

.hero-content {
  max-width: 650px;
}

.hero h1 {
  font-size: 46px;
  margin-bottom: 20px;
  line-height: 1.2;
}

.hero p {
  margin-bottom: 30px;
  color: #bbb;
}

.btn {
  padding: 12px 28px;
  background: #e63946;
  color: #fff;
  font-size: 14px;
  border-radius: 4px;
  transition: 0.3s;
  text-decoration: none;
}

.btn:hover {
  background: #c62836;
}

/* ===== SECTIONS ===== */

.section {
  padding: 90px 8%;
}

.section h2 {
  margin-bottom: 50px;
  font-size: 28px;
}

.about {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 60px;
  flex-wrap: wrap;
}

.about img {
  width: 350px;
  border-radius: 10px;
}

.about-text {
  flex: 1;
  min-width: 300px;
}

.about-text p {
  color: #ccc;
  font-size: 15px;
}

.grid {
  display: grid;
  gap: 20px;
}

.portfolio-grid {
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.portfolio-grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 8px;
  transition: 0.3s;
}

.portfolio-grid img:hover {
  transform: scale(1.05);
}

.reviews {
  background: #111;
  padding: 80px 8%;
}

.review-box {
  background: #1c1c1c;
  padding: 25px;
  border-radius: 8px;
  margin-bottom: 20px;
  color: #ccc;
}

footer {
  background: #000;
  padding: 50px 8%;
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* ===== MOBILE FIX ===== */

@media(max-width: 900px) {

  nav {
    position: absolute;
    top: 70px;
    right: 0;
    background: #000;
    width: 100%;
    display: none;
    flex-direction: column;
    text-align: center;
    padding: 20px 0;
  }

  nav a {
    display: block;
    margin: 15px 0;
    font-size: 16px;
  }

  nav.active {
    display: flex;
  }

  .menu-toggle {
    display: block;
  }

  .hero h1 {
    font-size: 36px;
  }

  .about {
    flex-direction: column;
    text-align: center;
  }

  .about img {
    width: 100%;
    max-width: 400px;
  }
}

</style>
</head>
<body>

<header>
  <div class="logo">4U Tattoo Studio</div>

  <div class="menu-toggle" id="menu-toggle">☰</div>

  <nav id="navbar">
    <a href="#">Home</a>
    <a href="#">Artists</a>
    <a href="#">Gallery</a>
    <a href="#">Marketplace</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- YOUR PAGE CONTENT REMAINS SAME BELOW -->

<!-- Add this before closing body -->

<script>
  const toggle = document.getElementById("menu-toggle");
  const navbar = document.getElementById("navbar");

  toggle.addEventListener("click", () => {
    navbar.classList.toggle("active");
  });
</script>

</body>
</html>
